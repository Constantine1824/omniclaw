version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  omniclaw-ops-api:
    build: .
    command: uvicorn omniclaw.ops.api:app --host 0.0.0.0 --port 8088 --reload
    environment:
      - OMNICLAW_REDIS_URL=redis://redis:6379/0
      - OMNICLAW_OPS_API_KEY=${OMNICLAW_OPS_API_KEY:-}
      - OMNICLAW_OPS_CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - OMNICLAW_EVENTS_ENABLED=true
    ports:
      - "8088:8088"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  redis-data:
