name: Feature request
description: Propose a new feature or major improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve for developers, operators, or contributors?
      placeholder: The current experience is missing...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement.
      placeholder: Add support for...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - MCP server
        - npm SDK
        - CLI
        - Docs
        - Examples
        - CI / Release
        - Trust / ERC-8004
    validations:
      required: true
  - type: textarea
    id: use_cases
    attributes:
      label: Use cases
      description: Who benefits from this and how would it be used?
  - type: textarea
    id: acceptance
    attributes:
      label: Suggested acceptance criteria
      description: Optional but helpful.
      placeholder: |
        - ...
        - ...
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this request
          required: true
