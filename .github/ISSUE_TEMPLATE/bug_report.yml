name: Bug report
description: Report a reproducible problem in the SDK, MCP server, docs, or examples
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
      placeholder: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - MCP server
        - npm SDK
        - CLI
        - Docs
        - Examples
        - CI / Release
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Include OS, Python version, package version, Redis setup, and relevant config details.
      placeholder: |
        OS:
        Python:
        OmniClaw version:
        Redis:
        Relevant env vars:
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report
          required: true
        - label: This is not a security disclosure
          required: true
