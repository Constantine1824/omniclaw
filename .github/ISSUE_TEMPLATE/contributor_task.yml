name: Contributor task
description: Create a scoped task for contributors to pick up
title: "[Task] "
labels:
  - help wanted
body:
  - type: textarea
    id: summary
    attributes:
      label: Task summary
      description: Describe the work to be done.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - MCP server
        - npm SDK
        - CLI
        - Docs
        - Examples
        - CI / Release
        - Trust / ERC-8004
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Explain why this work matters and any repo context a contributor should know.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link relevant files, issues, docs, or examples.
  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested difficulty
      options:
        - Good first issue
        - Intermediate
        - Advanced
    validations:
      required: true
