services:
  omniclaw-agent:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    command: uv run uvicorn omniclaw.agent.server:app --host 0.0.0.0 --port 8080
    environment:
      - CIRCLE_API_KEY=TEST_API_KEY:50d35122138d03a59b1d16b2b700ce8b:7332fd15939df66501d2a46b4ce8c83b
      - OMNICLAW_PRIVATE_KEY=0x5ec6f9922879be60d25c2d10b39a89cd8138eeffedc077296a174c2a1b9254c0
      - OMNICLAW_RPC_URL=https://ethereum-sepolia-rpc.publicnode.com
      - OMNICLAW_NETWORK=ETH-SEPOLIA
      - OMNICLAW_STORAGE_BACKEND=memory
      - OMNICLAW_AGENT_TOKEN=test-agent-token
      - OMNICLAW_AGENT_POLICY_PATH=/config/policy.json
    volumes:
      - ./policy.json:/config/policy.json
    ports:
      - "9080:8080"

  seller:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    command: uv run python3 examples/agent/seller.py
    environment:
      - OMNICLAW_RPC_URL=https://ethereum-sepolia-rpc.publicnode.com
    ports:
      - "9001:8001"
